name: FrostCore
version: ${version}
main: dev.frost.frostcore.Main
api-version: '1.21'
authors: [ Frost ]
softdepend:
  - PlaceholderAPI
  - LuckPerms
commands:
  team:
    description: Main team management command
    usage: /team <subcommand>
    aliases: [teams, t]
    permission: frostcore.team.use
    permission-message: §cYou don't have permission to use team commands.
  tpa:
    description: Send a teleport request to a player
    usage: /tpa <player>
    permission: frostcore.tpa
  tpahere:
    description: Request a player to teleport to you
    usage: /tpahere <player>
    permission: frostcore.tpa
  tpaccept:
    description: Accept a teleport request
    usage: /tpaccept [player]
    permission: frostcore.tpa
  tpdecline:
    aliases: [tpdeny]
    description: Decline a teleport request
    usage: /tpdecline [player]
    permission: frostcore.tpa
  tpatoggle:
    aliases: [tpaoff, tpaon]
    description: Toggle receiving teleport requests
    usage: /tpatoggle
    permission: frostcore.tpa
  warp:
    description: Teleport to a server warp by name
    usage: /warp <warp>
    permission: frostcore.warp
  warps:
    description: Open the interactive warp browser GUI
    usage: /warps
    permission: frostcore.warp
  sethome:
    description: Set a personal home
    usage: /sethome [name]
    permission: frostcore.sethome
  home:
    description: Teleport to a personal home
    usage: /home [name]
    permission: frostcore.home
  delhome:
    description: Delete a personal home
    usage: /delhome <name>
    permission: frostcore.delhome
  renamehome:
    description: Rename a personal home
    usage: /renamehome <old> <new>
    permission: frostcore.renamehome
  homes:
    description: Open the personal homes GUI
    usage: /homes
    permission: frostcore.homes

  spawn:
    description: Teleport to the server spawn
    usage: /spawn
    permission: frostcore.spawn
  tp:
    description: Admin teleport command
    usage: /tp <player> or /tp <x> <y> <z>
    permission: frostcore.admin
  tp2p:
    description: Teleport a player to another player
    usage: /tp2p <player1> <player2>
    permission: frostcore.admin
  tphere:
    description: Teleport a player to you
    usage: /tphere <player>
    permission: frostcore.admin
  otp:
    description: Teleport to an offline player's location
    usage: /otp <player>
    aliases: [offlinetp]
    permission: frostcore.admin
  setwarp:
    description: Create a server warp
    usage: /setwarp <name>
    permission: frostcore.admin
  delwarp:
    description: Delete a server warp
    usage: /delwarp <name>
    permission: frostcore.admin
  setspawn:
    description: Set the server spawn point
    usage: /setspawn
    permission: frostcore.admin
  frostcore:
    description: FrostCore admin utilities
    usage: /frostcore <reload>
    permission: frostcore.admin
    aliases: [fc]
  gm:
    description: Change your gamemode
    usage: /gm <0-3/s/c/a/sp> [player]
    permission: frostcore.gamemode
  gms:
    description: Set gamemode to survival
    usage: /gms [player]
    permission: frostcore.gamemode.survival
  gmc:
    description: Set gamemode to creative
    usage: /gmc [player]
    permission: frostcore.gamemode.creative
  gma:
    description: Set gamemode to adventure
    usage: /gma [player]
    permission: frostcore.gamemode.adventure
  gmsp:
    description: Set gamemode to spectator
    usage: /gmsp [player]
    permission: frostcore.gamemode.spectator
  fly:
    description: Toggle flight mode
    usage: /fly [player] [speed]
    permission: frostcore.utility.fly
  heal:
    description: Heal and feed a player
    usage: /heal [player]
    permission: frostcore.utility.heal
  feed:
    description: Feed a player
    usage: /feed [player]
    permission: frostcore.utility.feed
  god:
    description: Toggle god mode
    usage: /god [player]
    permission: frostcore.utility.god
  speed:
    description: Change walk or fly speed
    usage: /speed <fly|walk> <1-10> [player]
    permission: frostcore.utility.speed
  clear:
    description: Clear inventory
    usage: /clear [player]
    permission: frostcore.utility.clear
  nick:
    description: Set a nickname
    usage: /nick [player] <name>
    permission: frostcore.utility.nick
  unnick:
    description: Remove a nickname
    usage: /unnick [player]
    permission: frostcore.utility.nick
  itemrename:
    description: Rename the held item
    usage: /itemrename <name>
    permission: frostcore.utility.rename
  lore:
    description: Modify item lore
    usage: /lore <add|set|remove> [line] <text>
    permission: frostcore.utility.lore
  repair:
    description: Repair the held item or all items
    usage: /repair [all] [player]
    permission: frostcore.utility.repair
  mute:
    description: Mute a player
    usage: /mute <player> [time]
    permission: frostcore.moderation.mute
  unmute:
    description: Unmute a player
    usage: /unmute <player>
    permission: frostcore.moderation.mute
  lockchat:
    description: Lock global chat
    usage: /lockchat
    permission: frostcore.moderation.lockchat
  unlockchat:
    description: Unlock global chat
    usage: /unlockchat
    permission: frostcore.moderation.lockchat
  freeze:
    description: Freeze a player
    usage: /freeze <player>
    permission: frostcore.moderation.freeze
  screenshare:
    description: Put a player into screenshare mode
    usage: /screenshare <player>
    aliases: [ss]
    permission: frostcore.moderation.screenshare
  staffchat:
    description: Toggle staff chat or send a message
    usage: /staffchat [message]
    aliases: [sc]
    permission: frostcore.staffchat
  sudo:
    description: Force a player to run a command or chat
    usage: /sudo <player> <message|command>
    permission: frostcore.admin.sudo
  broadcast:
    description: Send a server-wide announcement
    usage: /broadcast <message>
    permission: frostcore.admin.broadcast
  chat:
    description: Chat management tools
    usage: /chat clear
    permission: frostcore.moderation.chatclear
  day:
    description: Set world time to day
    usage: /day
    permission: frostcore.admin.time
  night:
    description: Set world time to night
    usage: /night
    permission: frostcore.admin.time
  time:
    description: Manage world time
    usage: /time set <value>
    permission: frostcore.admin.time
  weather:
    description: Manage world weather
    usage: /weather <clear|rain|thunder>
    permission: frostcore.admin.weather
  top:
    description: Teleport to the highest block
    usage: /top
    permission: frostcore.admin.top
  bottom:
    description: Teleport to the lowest safe block
    usage: /bottom
    permission: frostcore.admin.bottom
  near:
    description: List nearby players
    usage: /near
    permission: frostcore.admin.near
  coords:
    description: See your or another player's coordinates
    usage: /coords [player]
    permission: frostcore.admin.coords
  back:
    description: Teleport to your previous location
    usage: /back
    permission: frostcore.utility.back
  invsee:
    description: View another player's inventory
    usage: /invsee <player>
    permission: frostcore.admin.invsee
  enderchest:
    description: Open your or another player's ender chest
    usage: /enderchest [player]
    aliases: [ec]
    permission: frostcore.admin.enderchest
  hat:
    description: Wear the held item as a hat
    usage: /hat
    permission: frostcore.admin.hat
  whois:
    description: View detailed player information
    usage: /whois <player>
    permission: frostcore.admin.whois
  smite:
    description: Strike a player with lightning
    usage: /smite <player>
    permission: frostcore.admin.smite
  vanish:
    description: Toggle vanish mode
    usage: /vanish
    aliases: [v]
    permission: frostcore.admin.vanish
  msg:
    description: Send a private message
    usage: /msg <player> <message>
    aliases: [tell, w, whisper, pm]
    permission: frostcore.message
  r:
    description: Reply to a private message
    usage: /r <message>
    aliases: [reply]
    permission: frostcore.message
  ignore:
    description: Ignore a player
    usage: /ignore <player>
    permission: frostcore.message
  msgtoggle:
    description: Toggle incoming private messages
    usage: /msgtoggle
    aliases: [msgoff, msgon]
    permission: frostcore.msgtoggle
  chattoggle:
    description: Toggle global chat visibility
    usage: /chattoggle
    aliases: [chatoff, chaton]
    permission: frostcore.chattoggle
  seen:
    description: Check when a player was last online
    usage: /seen <player>
    permission: frostcore.admin.whois
  kick:
    description: Kick a player from the server
    usage: /kick <player> [reason]
    permission: frostcore.moderation.kick
  ban:
    description: Ban a player from the server
    usage: /ban <player> [time] [reason]
    permission: frostcore.moderation.ban
  unban:
    description: Unban a player
    usage: /unban <player>
    permission: frostcore.moderation.ban
  warn:
    description: Warn a player
    usage: /warn <player> [reason] [-s] [-t template]
    permission: frostcore.moderation.warn
  unwarn:
    description: Remove a warning
    usage: /unwarn <player|ID>
    permission: frostcore.moderation.warn
  tempban:
    description: Temporarily ban a player
    usage: /tempban <player> <duration> [reason] [-s]
    permission: frostcore.moderation.ban
  tempmute:
    description: Temporarily mute a player
    usage: /tempmute <player> <duration> [reason] [-s]
    permission: frostcore.moderation.mute
  ipban:
    description: Ban a player by IP (auto-bans alts)
    usage: /ipban <player> [duration] [reason] [-s]
    aliases: [banip]
    permission: frostcore.moderation.ipban
  ipmute:
    description: Mute a player by IP
    usage: /ipmute <player> [duration] [reason] [-s]
    aliases: [muteip]
    permission: frostcore.moderation.ipmute
  jail:
    description: Jail a player
    usage: /jail <player> [jail] [duration] [reason]
    permission: frostcore.moderation.jail
  unjail:
    description: Release a player from jail
    usage: /unjail <player>
    permission: frostcore.moderation.jail
  setjail:
    description: Set a jail location
    usage: /setjail <name>
    permission: frostcore.moderation.jail.manage
  deljail:
    description: Delete a jail location
    usage: /deljail <name>
    permission: frostcore.moderation.jail.manage
  report:
    description: Report a player
    usage: /report <player> <reason>
    permission: frostcore.report
  checkban:
    description: View active ban info
    usage: /checkban <player|ID>
    permission: frostcore.moderation.check
  checkmute:
    description: View active mute info
    usage: /checkmute <player|ID>
    permission: frostcore.moderation.check
  checkwarn:
    description: View warning info
    usage: /checkwarn <player|ID>
    permission: frostcore.moderation.check
  history:
    description: View a player's punishment history
    usage: /history <player> [type]
    permission: frostcore.moderation.history
  staffhistory:
    description: View punishments issued by a staff member
    usage: /staffhistory <staff> [type]
    permission: frostcore.moderation.history
  warnings:
    description: View active warnings for a player
    usage: /warnings [player]
    permission: frostcore.moderation.check
  banlist:
    description: List all active bans
    usage: /banlist [page]
    permission: frostcore.moderation.check
  mutelist:
    description: List all active mutes
    usage: /mutelist [page]
    permission: frostcore.moderation.check
  warnlist:
    description: List all active warnings
    usage: /warnlist [page]
    permission: frostcore.moderation.check
  alts:
    description: Show alt accounts by shared IP
    usage: /alts <player>
    aliases: [dupeip]
    permission: frostcore.moderation.alts
  iphistory:
    description: View IP history for a player
    usage: /iphistory <player>
    permission: frostcore.moderation.alts
  namehistory:
    description: View previous usernames of a player
    usage: /namehistory <player>
    permission: frostcore.moderation.namehistory
  reports:
    description: View open player reports
    usage: /reports [page]
    permission: frostcore.moderation.reports
  lockdown:
    description: Toggle server lockdown
    usage: /lockdown [reason]
    permission: frostcore.moderation.lockdown
  prunehistory:
    description: Prune old punishment history
    usage: /prunehistory <player> [duration]
    permission: frostcore.moderation.admin
  staffrollback:
    description: Rollback punishments by a staff member
    usage: /staffrollback <staff> [duration]
    permission: frostcore.moderation.admin
  moderation:
    description: Moderation admin tools
    usage: /moderation allow <add|remove|check> <player>
    permission: frostcore.moderation.admin
  tpall:
    description: Teleport all players to you
    usage: /tpall
    permission: frostcore.admin.tpall
  ping:
    description: Check your ping or another player's ping
    usage: /ping [player]
    permission: frostcore.ping
  skull:
    description: Get a player's head as an item
    usage: /skull <player>
    permission: frostcore.admin.skull
  socialspy:
    description: Toggle social spy to see all private messages
    usage: /socialspy
    permission: frostcore.admin.socialspy
  ram:
    description: View server performance information
    usage: /ram
    permission: frostcore.admin.ram
  mace:
    description: Mace limiter admin tools
    usage: /mace <info|list|inspect|destroy|give|settings|reload|reset>
    permission: frostcore.mace.admin
  glow:
    description: Toggle glow effect with color
    usage: /glow [color] or /glow <player> <color>
    aliases: [glowcolor]

