# FrostCore 

# Database Configuration
# Supported types: SQLITE, MYSQL
database:
  type: SQLITE                  
  # MySQL settings (only used when type is MYSQL)
  mysql:
    host: localhost
    port: 3306
    database: frostcore
    username: root
    password: ""
    pool-size: 10

# GUI Settings
gui:
  borders: true         

# Logging & Auditing Settings
logging:
  audit-enabled: true    # If true, logs important actions to plugins/FrostCore/logs/audit.log

# Universal Teleport Settings
# These apply to ALL teleports in the plugin (homes, warps, tpa, etc.)
teleport:
  action-bar: true         # Show progress bar action bar during teleport countdown
  action-bar-style: BAR    # Can be 'BAR' (shows ●●●○○ animation) or 'TEXT' (shows 'Teleporting in 3s...')
  title: true              # Show "Teleported!" subtitle on arrival
  sounds: true             # Play countdown + arrival sounds
  particles: true     # Show portal particles on arrival
  admin-bypass: false # If false, admins/OPs will experience delay and cooldown like normal players

# TPA Settings
tpa:
  enabled: true
  cooldown: 30        # Seconds before /tpa can be used again
  delay: 3            # Warmup delay before teleporting (cancelled if player moves)
  expiry: 60          # Seconds before a tpa request expires

# Server Warps
warps:
  enabled: true
  cooldown: 10        # Cooldown between warp uses (seconds)
  delay: 3            # Warmup delay before teleporting (seconds)
  # When gui-enabled is true, /warps opens a chest GUI.
  # When false, /warps shows the classic chat list.
  gui-enabled: true
  gui:
    # Number of chest rows (3–6). Determines how many warp slots fit per page.
    # rows: 5  →  content area rows 1–3 = 21 slots/page  (recommended)
    # rows: 6  →  content area rows 1–4 = 28 slots/page
    rows: 3
    # Content area: slots in this rectangle are filled with warp items.
    # Leave a 1-slot border on each side for the glass pane frame.
    content:
      start-row: 1   # First content row  (0 = top row; keep ≥1 for top border)
      end-row: 1     # Last content row   (keep ≤ rows-2 to leave space for nav)
      start-col: 1   # First content col  (0 = left edge; keep ≥1 for side border)
      end-col: 7     # Last content col   (8 = right edge; keep ≤7 for side border)

# Spawn Settings
spawn:
  enabled: true
  cooldown: 10
  delay: 3
  teleport-on-join: false    # Teleport players to spawn on first join
  teleport-on-respawn: true  # Teleport players to spawn on death

utility:
  near-radius: 100

# Back Command Settings
back:
  cooldown: 5
  delay: 3

# Personal Homes Settings
homes:
  enabled: true
  max-homes: 5        # Global limit on max homes. Can be overridden using permissions like frostcore.homes.limit.10
  cooldown: 10        # Cooldown between home uses (seconds)
  delay: 3            # Warmup delay before teleporting (seconds)
  gui:
    rows: 4           # Rows for the /homes GUI
    content:
      start-row: 1    # Where the personal homes start matching the screenshot (0-indexed. This means Row 2)
      end-row: 2      # End row for personal homes
      start-col: 3    # Col 4 for personal homes. Ensures 1 separator slot between team home and personal homes.
      end-col: 6      # Col 7. Ensures 1 padding slot at the rightmost corner.


teams:
  enabled: true  # Enables or disables the entire teams system (blocks all /team commands)

  # Role Limits
  max-owners: 2    # Maximum number of owners (highest authority in team)
  max-admins: 4    # Maximum number of admins (second-highest role)
  player-limit: 10 # Total number of players allowed in one team

  # Core Features
  pvp-toggle: true      # Default PvP state when a new team is created (true = PvP enabled)
  team-chat: true       # Enables private team chat channel (/team chat)
  friendly-fire: false  # If false, teammates cannot damage each other when PvP is disabled

  # Team Name Settings
  team-name-max-length: 16  # Maximum length of team name
  team-name-min-length: 3   # Minimum length required for team name
  team-name-banned: 
    - "fuck"
    - "nigger"
    - "pussy"
    - "bitch"
    - "nigga"
    - "faggot"
    - "retard"
    - "shit"
    - "cunt"
    - "whore"
    - "asshole"
    - "slut"
    - "dick"
    - "cock"
    - "bastard"
    - "twat"
    - "wank"
    - "rape"
    - "pedo"
    - "fag"
    - "dyke"
    - "tranny"
    - "nazi"

  # Team Tag Settings
  tag-max-length: 6     # Maximum length of team tag
  tag-min-length: 1     # Minimum length of team tag

  # Invite Settings
  invites:
    team-join-expiry: 60     # How long (in seconds) a team join invite lasts before expiring
    team-ally-expiry: 120    # How long (in seconds) an ally request lasts before expiring

  # Team Home Settings
  home:
    enabled: true   # Allows use of /team home command
    cooldown: 10    # Time (in seconds) before the command can be used again
    delay: 5        # Delay (in seconds) before teleport - cancelled if player moves

  # Team Warps
  warps:
    enabled: true   # Allows teams to create warp points
    limit: 5        # Maximum number of warps a team can have
    cooldown: 10    # Cooldown (in seconds) between warp uses
    delay: 5        # Delay (in seconds) before teleporting to a warp

  # Relations System
  relations:
    allies-enabled: true   # Allows teams to add other teams as allies
    enemies-enabled: true  # Allows teams to mark other teams as enemies
    max-allies: 4          # Maximum number of allied teams
    max-enemies: 4         # Maximum number of enemy teams

  # Team Echest (Shared Storage)
  echest:
    enabled: true  # Enables shared team ender chest inventory
    slots: 27      # Number of slots (must be multiple of 9: 9, 18, 27, 36, 45, 54)

  # Team List Pagination
  list:
    teams-per-page: 10  # Number of teams shown per page in /team list

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#                 MODERATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
moderation:
  enabled: true

  # Broadcast punishments to online staff with frostcore.moderation.notify
  broadcast-to-staff: true

  # Commands blocked while muted (prevents circumventing mute via /msg etc.)
  muted-blocked-commands:
    - "/msg"
    - "/tell"
    - "/w"
    - "/whisper"
    - "/pm"
    - "/me"
    - "/say"
    - "/reply"
    - "/r"

  # Use group weights for exemption (lower weight staff can't punish higher weight)
  use-group-weights: true

  # Server name shown in punishment records and Discord embeds
  server-name: "Survival"

  # Discord Webhooks (leave empty to disable)
  # Validates on startup — invalid URLs are auto-disabled
  webhooks:
    punishments: ""      # Bans, mutes, warns, kicks
    reports: ""          # Player reports
    staff-activity: ""   # Staff admin actions (lockdown, rollback, prune)
    staffchat: ""        # Staff messages