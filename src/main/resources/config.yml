# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  FrostCore — Main Configuration
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
#  Core settings for database, teleportation, teams, moderation,
#  and all other FrostCore modules. Changes require /frostcore reload.
#
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ┌─────────────────────────────────┐
# │           DATABASE              │
# └─────────────────────────────────┘
# Supported types: SQLITE, MYSQL

database:
  type: SQLITE
  # MySQL settings (only used when type is MYSQL)
  mysql:
    host: localhost
    port: 3306
    database: frostcore
    username: root
    password: ""
    pool-size: 10

# ┌─────────────────────────────────┐
# │         GUI SETTINGS            │
# └─────────────────────────────────┘

gui:
  borders: true                    # If true, all GUI menus (warps, homes, etc.) have a decorative glass pane border

# ┌─────────────────────────────────┐
# │       LOGGING & AUDITING        │
# └─────────────────────────────────┘

logging:
  audit-enabled: true              # Log important actions to plugins/FrostCore/logs/audit.log

# ┌─────────────────────────────────┐
# │          TELEPORTATION          │
# └─────────────────────────────────┘
# Universal settings that apply to ALL teleports (homes, warps, tpa, etc.)

teleport:
  action-bar: true                 # Show progress bar action bar during teleport countdown
  action-bar-style: BAR            # BAR = ●●●○○ animation | TEXT = "Teleporting in 3s..."
  title: true                      # Show "Teleported!" subtitle on arrival
  sounds: true                     # Play countdown + arrival sounds
  particles: true                  # Show portal particles on arrival
  admin-bypass: false              # If false, admins/OPs experience delay and cooldown like normal players

# ┌─────────────────────────────────┐
# │              TPA                │
# └─────────────────────────────────┘

tpa:
  enabled: true
  cooldown: 30                     # Seconds before /tpa can be used again
  delay: 3                         # Warmup delay before teleporting (cancelled on movement)
  expiry: 60                       # Seconds before a tpa request expires

# ┌─────────────────────────────────┐
# │          SERVER WARPS           │
# └─────────────────────────────────┘

warps:
  enabled: true
  cooldown: 10                     # Cooldown between warp uses (seconds)
  delay: 3                         # Warmup delay before teleporting (seconds)
  # When gui-enabled is true, /warps opens a chest GUI.
  # When false, /warps shows the classic chat list.
  gui-enabled: true

  # ── GUI Layout ──
  # Content area: slots in this rectangle are filled with warp items.
  # Leave a 1-slot border on each side for the glass pane frame.
  gui:
    # Number of chest rows (3–6). Determines how many warp slots fit per page.
    #   rows: 3  →  content area = 1 row  = 7 slots/page
    #   rows: 5  →  content area rows 1–3 = 21 slots/page  (recommended)
    #   rows: 6  →  content area rows 1–4 = 28 slots/page
    rows: 3
    content:
      start-row: 1                 # First content row  (0 = top row; keep ≥1 for top border)
      end-row: 1                   # Last content row   (keep ≤ rows-2 to leave space for nav row)
      start-col: 1                 # First content col  (0 = left edge; keep ≥1 for side border)
      end-col: 7                   # Last content col   (8 = right edge; keep ≤7 for side border)

# ┌─────────────────────────────────┐
# │             SPAWN               │
# └─────────────────────────────────┘

spawn:
  enabled: true
  cooldown: 10                     # Cooldown between /spawn uses (seconds)
  delay: 3                         # Warmup delay before teleporting (seconds)
  teleport-on-join: false          # If true, teleport players to spawn on their first join
  teleport-on-respawn: true        # If true, teleport players to spawn when they die/respawn

# ┌─────────────────────────────────┐
# │            UTILITY              │
# └─────────────────────────────────┘

utility:
  near-radius: 100                 # Default radius (in blocks) for the /near command

# ┌─────────────────────────────────┐
# │          BACK COMMAND           │
# └─────────────────────────────────┘

back:
  cooldown: 5                      # Cooldown between /back uses (seconds)
  delay: 3                         # Warmup delay before teleporting (seconds)

# ┌─────────────────────────────────┐
# │        PERSONAL HOMES           │
# └─────────────────────────────────┘

homes:
  enabled: true
  max-homes: 5                     # Global limit (override with frostcore.homes.limit.<N>)
  cooldown: 10                     # Cooldown between home uses (seconds)
  delay: 3                         # Warmup delay before teleporting (seconds)

  # ── GUI Layout ──
  # The /homes GUI shows the team home (if any) on the left and personal homes
  # in the content area defined below. Adjust to taste.
  gui:
    rows: 4                        # Number of rows for the /homes GUI chest
    content:
      start-row: 1                 # First content row (0-indexed — this means GUI row 2)
      end-row: 2                   # Last content row for personal homes
      start-col: 3                 # Col 4 — ensures 1 separator slot between team home and personal homes
      end-col: 6                   # Col 7 — ensures 1 padding slot at the rightmost corner

# ┌─────────────────────────────────┐
# │             TEAMS               │
# └─────────────────────────────────┘

teams:
  enabled: true                    # Enables or disables the entire teams system (blocks all /team commands)

  # ── Role Limits ──
  max-owners: 2                    # Maximum number of owners (highest authority)
  max-admins: 4                    # Maximum number of admins (second-highest role)
  player-limit: 10                 # Total players allowed in one team

  # ── Core Features ──
  pvp-toggle: true                 # Default PvP state for new teams (true = PvP enabled)
  team-chat: true                  # Enables private team chat (/team chat)
  friendly-fire: false             # If false, teammates can't damage each other when PvP off

  # ── Team Name Settings ──
  team-name-max-length: 16         # Maximum character length of a team name
  team-name-min-length: 3          # Minimum character length required for a team name
  team-name-banned:
    - "fuck"
    - "nigger"
    - "pussy"
    - "bitch"
    - "nigga"
    - "faggot"
    - "retard"
    - "shit"
    - "cunt"
    - "whore"
    - "asshole"
    - "slut"
    - "dick"
    - "cock"
    - "bastard"
    - "twat"
    - "wank"
    - "rape"
    - "pedo"
    - "fag"
    - "dyke"
    - "tranny"
    - "nazi"

  # ── Team Tag Settings ──
  tag-max-length: 6                # Maximum character length of a team tag
  tag-min-length: 1                # Minimum character length of a team tag

  # ── Invite Settings ──
  invites:
    team-join-expiry: 60           # Seconds before a join invite expires
    team-ally-expiry: 120          # Seconds before an ally request expires

  # ── Team Home ──
  home:
    enabled: true                  # Allows use of /team home command
    cooldown: 10                   # Time (in seconds) before the command can be used again
    delay: 5                       # Delay (in seconds) before teleport — cancelled if player moves

  # ── Team Warps ──
  warps:
    enabled: true                  # Allows teams to create warp points
    limit: 5                       # Maximum number of warps a team can have
    cooldown: 10                   # Cooldown (in seconds) between warp uses
    delay: 5                       # Delay (in seconds) before teleporting to a warp

  # ── Relations System ──
  relations:
    allies-enabled: true           # Allows teams to add other teams as allies
    enemies-enabled: true          # Allows teams to mark other teams as enemies
    max-allies: 4                  # Maximum number of allied teams
    max-enemies: 4                 # Maximum number of enemy teams

  # ── Team Echest (Shared Storage) ──
  echest:
    enabled: true                  # Enables shared team ender chest inventory
    slots: 27                      # Number of slots (must be a multiple of 9: 9, 18, 27, 36, 45, 54)

  # ── Team List Pagination ──
  list:
    teams-per-page: 10             # Number of teams shown per page in /team list

# ┌─────────────────────────────────┐
# │          MODERATION             │
# └─────────────────────────────────┘

moderation:
  enabled: true

  # Broadcast punishment actions to online staff who have frostcore.moderation.notify
  broadcast-to-staff: true

  # ── Muted Blocked Commands ──
  # Commands blocked while muted (prevents circumventing mute via /msg, etc.)
  muted-blocked-commands:
    - "/msg"
    - "/tell"
    - "/w"
    - "/whisper"
    - "/pm"
    - "/me"
    - "/say"
    - "/reply"
    - "/r"

  # ── Group Weights ──
  # Use group weights for exemption — lower-weight staff can't punish higher-weight staff.
  # Weights are defined per-group in punishments.yml.
  use-group-weights: true

  # ── Server Identity ──
  # Server name shown in punishment records and Discord webhook embeds.
  server-name: "Survival"

  # ── Discord Webhooks ──
  # Leave empty ("") to disable. Invalid URLs are auto-disabled on startup.
  webhooks:
    punishments: ""                # Bans, mutes, warns, kicks
    reports: ""                    # Player reports
    staff-activity: ""             # Staff admin actions (lockdown, rollback, prune)
    staffchat: ""                  # Staff messages

# ┌─────────────────────────────────┐
# │         MACE LIMITER            │
# └─────────────────────────────────┘

mace-limiter:
  enabled: false
  # Maximum number of maces allowed on the entire server
  max-maces-overall: 3
  # Maximum number of maces a single player can hold (0 = unlimited)
  max-maces-per-player: 1
  # What to do when a player joins with an untracked mace (e.g. from creative):
  #   TRACK      = auto-register and count it towards the limit
  #   CONFISCATE = remove the mace from the player's inventory
  #   IGNORE     = leave it alone, don't track it
  untracked-mace-action: TRACK
  # Notify staff with frostcore.mace.notify when maces are crafted/destroyed/transferred
  notify-staff: true

  # ── Enchantment Limits ──
  # Enchantments not listed here are unlimited.
  enchantment-limits:
    DENSITY: 5
    BREACH: 4
    WIND_BURST: 3

  # ── Combat Restrictions ──
  # Worlds where maces cannot be used in PvP (list world names)
  restricted-worlds: []
  # Cooldown between mace PvP hits in seconds (0 = no cooldown / disabled)
  pvp-cooldown: 0
  # Maximum damage a mace can deal per hit (0 = unlimited / vanilla behavior)
  damage-cap: 0
  # If true, maces are destroyed (removed from drops) when a player dies
  disable-on-death: false
  # Material types tracked by the mace limiter system
  tracked-materials:
    - MACE

# ┌─────────────────────────────────┐
# │              CHAT               │
# └─────────────────────────────────┘

chat:
  mentions:
    enabled: true
    # If true, players must use @ before a name to mention them. If false, typing an exact username triggers a mention implicitly.
    require-at-symbol: true
    # Format of the mention for the player who was mentioned (using MiniMessage tags)
    format-self: "<yellow>@{player}</yellow>"
    # Format of the mention for everyone else who sees the message
    format-others: "<#AAAAAA>@{player}</#AAAAAA>"
    # Give the mentioned player an actionbar message
    actionbar: true
    actionbar-message: "<yellow>You were mentioned by {player}!"
    # Play a sound for the mentioned player
    sound: true
    sound-type: "ENTITY_EXPERIENCE_ORB_PICKUP"
    sound-volume: 2.0
    sound-pitch: 1.0
    # Enable @everyone tagging (requires frostcore.mention.everyone permission)
    everyone-tag: true

  # ┌─────────────────────────────────┐
  # │   ANTI-SPAM & CHAT FILTERING    │
  # └─────────────────────────────────┘

  anti-spam:
    enabled: true
    # Send a warning message if a spam check fails
    send-warning: true
    # Cooldown between chat messages
    cooldown:
      enabled: true
      punish: false # If false, just cancels message without moderation points
      time-ms: 1500
      # Cooldown scaling: cooldown * (1 + violationCount * scale) up to max-cooldown-ms
      scale: 0.35
      max-cooldown-ms: 8000
    # Checks if message is significantly similar to their previous message
    similarity:
      enabled: true
      punish: true
      threshold: 0.85
    # Checks if message has excessive capitalized letters
    caps:
      enabled: true
      punish: true
      max-percentage: 70
      min-length: 5 # Only checks messages over 5 characters long
    # Detects Zalgo or aaaabbbbb repetition
    repeat:
      enabled: true
      punish: true
      max-chars: 5
    # Detects multiple fast messages that circumvent cooldown barely
    burst:
      enabled: true
      punish: true
      max-messages: 5
      interval-ms: 3000

  filter:
    enabled: true
    send-warning: true
    # If true, matches blacklist words inside other words (e.g. 'bad' matches 'badboy')
    in-word-detection: true
    # Words to completely block regardless of context (supports * wildcards internally)
    blacklist:
      - "nigger"
      - "faggot"
      - "nigga"
      # These words are proactively matched against obfuscation
    # Custom Regex patterns
    regex:
      - "(?i).*discord\\.gg/.*"
    # Block IP Addresses
    block-ips: true
    # Block external domains
    block-domains: true
    # Allowed domains
    whitelisted-domains:
      - "youtube.com"
      - "twitch.tv"
    # Action when a filter triggers
    actions:
      cancel-message: false
      replace: "***" # Only applies if cancel-message is false

  punishments:
    enabled: true
    # Time (in seconds) until a violation point decays automatically.
    # E.g. If a player is clean for 900 seconds (15 minutes), 1 violation point is removed.
    decay-seconds: 180
    # Weights define how many violation points a specific check triggers.
    weights:
      CAPS: 1
      BURST: 1
      SIMILARITY: 1
      DOMAIN: 2
      IP: 2
      BLACKLIST: 3
      REGEX: 2
      REPEAT: 2
    # Escalation levels for chat violations. When a player receives a violation point
    # (e.g. from caps, spam, or swearing), they gain +1 level.
    # The actions below execute based on their current level.
    # Supported Actions: WARN, MUTE, KICK
    # Time Formats: s (seconds), m (minutes), h (hours), d (days). Use 0s for permanent/indefinite.
    # NOTE: Violations are automatically reset to 0 once they hit the maximum defined level here.
    levels:
      1:
        action: WARN
        duration: 0s
      3:
        action: MUTE
        duration: 5m
      5:
        action: MUTE
        duration: 30m

# ##############################################################################
# #                            BOUNTY SYSTEM                                    #
# ##############################################################################

bounty:

  # Set to false to disable the entire bounty system.
  # Also disabled automatically if Vault/Economy is unavailable.
  enabled: true

  # Minimum amount a player can place as a bounty.
  min-amount: 100.0

  # Maximum amount a player can place as a bounty.
  max-amount: 1000000.0

  # Cooldown between placing bounties (in milliseconds). 0 = no cooldown.
  place-cooldown-ms: 30000

  # Maximum number of contributors per bounty target. 0 = unlimited.
  max-contributors: 0

  # Prevent players from placing a bounty on themselves.
  prevent-self-bounty: true

  # How long a bounty stays active (milliseconds). -1 = never expires.
  # 86400000 = 24 hours.
  expiry-ms: -1

  # If true, contributors are refunded when a bounty is removed or expires.
  refund-on-remove: false
  refund-on-expire: false

  # Percentage of their contribution to refund (0-100).
  refund-percentage: 100.0

  # -- Announcements ---------------------------------------------------------
  announce:
    # Broadcast when a bounty is placed.
    on-place: false
    # Broadcast when a bounty is claimed.
    on-claim: true
    # true = full server broadcast; false = no broadcast (still sends to participants).
    broadcast: true
    # Only broadcast if the total bounty value is at or above this threshold.
    min-amount-threshold: 0.0

  # -- Optional anti-abuse settings ------------------------------------------
  anti-abuse:
    # Prevent claiming a bounty you also contributed to.
    prevent-self-claim: true


# ┌─────────────────────────────────┐
# │       RANDOM TELEPORT (RTP)     │
# └─────────────────────────────────┘

rtp:
  enabled: true
  gui-enabled: true                  # If true, /rtp opens a world-selection GUI
  cooldown: 60                       # Seconds before /rtp can be used again
  delay: 3                           # Warmup delay before teleporting (cancelled on movement)
  cancel-on-move: true               # Cancel RTP if the player moves during warmup
  max-attempts: 50                   # Maximum location search attempts before failure

  # ── Location Pool ─────────────────────────────────────────────
  # Pre-generates safe locations in the background for instant RTP.
  pool:
    size: 10                         # Number of pre-generated locations per world
    refill-interval: 100             # Ticks between pool refill checks (100 = 5 seconds)

  # ── Default World Settings ────────────────────────────────────
  # These defaults apply to all RTP worlds unless overridden per-world below.
  defaults:
    min-radius: 500                  # Minimum distance from center (creates donut shape)
    max-radius: 5000                 # Maximum distance from center
    min-y: 60                        # Lowest allowed Y coordinate
    max-y: 200                       # Highest allowed Y coordinate
    cost: 0                          # Cost per RTP (0 = free). Requires Vault economy.
    allow-water: false               # Allow teleporting onto water surfaces
    allow-lava: false                # Allow teleporting near lava
    center-x: 0                      # Center X of the RTP area
    center-z: 0                      # Center Z of the RTP area

  # ── Unsafe Blocks ─────────────────────────────────────────────
  # Blocks that should never be at the player's feet or head position.
  unsafe-blocks:
    - LAVA
    - FIRE
    - SOUL_FIRE
    - CAMPFIRE
    - SOUL_CAMPFIRE
    - MAGMA_BLOCK
    - CACTUS
    - SWEET_BERRY_BUSH
    - WITHER_ROSE
    - POWDER_SNOW

  # ── Per-World Settings ────────────────────────────────────────
  # Only worlds listed here are eligible for RTP.
  # Each world inherits from 'defaults' unless overridden.
  # GUI display settings (material, name, lore) are in rtp.yml.
  # frostcore.rtp.<world>
  worlds:
    world:
      min-radius: 500
      max-radius: 5000
      min-y: 60
      max-y: 200
      cost: 0
      allow-water: false
      allow-lava: false
    world_nether:
      min-radius: 200
      max-radius: 2000
      min-y: 32
      max-y: 120
      cost: 0
      allow-water: false
      allow-lava: false
    # ── Enable The End by uncommenting below ──
    # world_the_end:
    #   min-radius: 200
    #   max-radius: 3000
    #   min-y: 50
    #   max-y: 100
    #   cost: 0
    #   allow-water: false
    #   allow-lava: false
