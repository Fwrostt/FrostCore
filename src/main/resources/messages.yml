# FrostCore Messages

teleport:
  prefix: "<gradient:#55CDFC:#7B68EE>TELEPORT</gradient> <dark_gray>»</dark_gray> "

  # ━━━ TPA ━━━
  tpa-sent: "{teleport.prefix}<#B0C4FF>Request sent to <white>{player}</white>."
  tpa-received-header: "{teleport.prefix}<white>{player}</white> <#B0C4FF>wants to teleport to you."
  tpahere-received-header: "{teleport.prefix}<white>{player}</white> <#B0C4FF>wants you to teleport to them."
  tpa-expired-sender: "{teleport.prefix}<dark_gray>Your request to <white>{player}</white> expired."
  tpa-expired-target: "{teleport.prefix}<dark_gray>Teleport request from <white>{player}</white> expired."
  tpa-accepted-sender: "{teleport.prefix}<#55FF55><white>{player}</white> accepted your request!"
  tpa-accepted-target: "{teleport.prefix}<#55FF55>You accepted <white>{player}</white>'s request."
  tpa-declined-sender: "{teleport.prefix}<#FF5555><white>{player}</white> declined your request."
  tpa-declined-target: "{teleport.prefix}<#B0C4FF>Request declined."
  tpa-no-pending: "{teleport.prefix}<#FF5555>No pending teleport requests."
  tpa-self: "{teleport.prefix}<#FF5555>You can't send a request to yourself."
  tpa-already-sent: "{teleport.prefix}<#FF5555>You already have a pending request to that player."
  tpa-disabled: "{teleport.prefix}<#FF5555>TPA is currently disabled."
  tpa-cooldown: "{teleport.prefix}<#FF5555>On cooldown! <dark_gray>(<white>{time}s</white> remaining)"
  tpa-wait: "{teleport.prefix}<#B0C4FF>Teleporting in <white>{time}s</white> <#B0C4FF>- don't move!"
  tpa-teleport: "{teleport.prefix}<#55FF55>Teleported!"
  tpa-teleport-cancelled: "{teleport.prefix}<#FF5555>Teleport cancelled! <dark_gray>(you moved)"

  # ━━━ WARPS ━━━
  warp-teleport: "{teleport.prefix}<#55FF55>Teleported to <white>{warp}</white>."
  warp-not-found: "{teleport.prefix}<#FF5555>Warp <white>{warp}</white> not found."
  warp-cooldown: "{teleport.prefix}<#FF5555>On cooldown! <dark_gray>(<white>{time}s</white> remaining)"
  warp-wait: "{teleport.prefix}<#B0C4FF>Warping in <white>{time}s</white> <#B0C4FF>- don't move!"
  warp-teleport-cancelled: "{teleport.prefix}<#FF5555>Warp cancelled! <dark_gray>(you moved)"
  warp-set: "{teleport.prefix}<#55FF55>Warp <white>{warp}</white> has been set."
  warp-deleted: "{teleport.prefix}<#FF5555>Warp <white>{warp}</white> deleted."
  warp-already-exists: "{teleport.prefix}<#FF5555>Warp <white>{warp}</white> already exists. Use again to overwrite."
  warp-disabled: "{teleport.prefix}<#FF5555>Warps are currently disabled."
  no-warps: "{teleport.prefix}<#B0C4FF>There are no warps set."

  # ━━━ SPAWN ━━━
  spawn-teleport: "{teleport.prefix}<#55FF55>Teleported to spawn."
  spawn-cooldown: "{teleport.prefix}<#FF5555>On cooldown! <dark_gray>(<white>{time}s</white> remaining)"
  spawn-wait: "{teleport.prefix}<#B0C4FF>Teleporting to spawn in <white>{time}s</white> <#B0C4FF>- don't move!"
  spawn-teleport-cancelled: "{teleport.prefix}<#FF5555>Teleport cancelled! <dark_gray>(you moved)"
  spawn-set: "{teleport.prefix}<#55FF55>Spawn point has been set."
  spawn-not-set: "{teleport.prefix}<#FF5555>Spawn is not set yet."
  spawn-disabled: "{teleport.prefix}<#FF5555>Spawn is currently disabled."

  # ━━━ ADMIN TP ━━━
  tp-player: "{teleport.prefix}<#B0C4FF>Teleported to <white>{player}</white>."
  tp-coords: "{teleport.prefix}<#B0C4FF>Teleported to <white>{x}, {y}, {z}</white>."
  tp-here: "{teleport.prefix}<#B0C4FF>Teleported <white>{player}</white> to you."
  tp-here-target: "{teleport.prefix}<#B0C4FF>You were teleported to <white>{player}</white>."
  tp-to-player: "{teleport.prefix}<#B0C4FF>Teleported to <white>{player}</white>."
  tp-offline: "{teleport.prefix}<#B0C4FF>Teleported to <white>{player}</white>'s last known location."
  tp-offline-no-data: "{teleport.prefix}<#FF5555>No location data found for <white>{player}</white>."
  player-not-found: "{teleport.prefix}<#FF5555>Player not found."

  # ━━━ BACK ━━━
  back-no-location: "{teleport.prefix}<#FF5555>You don't have a previous location to return to."
  back-teleport: "{teleport.prefix}<#B0C4FF>Teleported to your previous location."
  back-wait: "{teleport.prefix}<#B0C4FF>Teleporting to your previous location in <white>{time}s</white>..."
  back-cooldown: "{teleport.prefix}<#FF5555>You must wait <white>{time}s</white> before using /back again."
  back-teleport-cancelled: "{teleport.prefix}<#FF5555>Teleport cancelled! You moved."

teams:
  prefix: "<gradient:#FFD27F:#FFB732>TEAM</gradient> <dark_gray>»</dark_gray> "

  # ━━━ TEAM CHAT ━━━
  chat-format: "<dark_gray>[<gradient:#FFD700:#FFA500>Team</gradient>] <white>{player}</white> <dark_gray>» <#FFD27F>{chat}"
  chat-enabled: "{teams.prefix}<#FFD27F>Team chat <green><bold>enabled</bold></green><#FFD27F>. Your messages are now team-only."
  chat-disabled: "{teams.prefix}<#FFD27F>Team chat <red><bold>disabled</bold></red><#FFD27F>. You are now in global chat."

  # ━━━ CORE ━━━
  create: "{teams.prefix}<#55FF55>Team <white>{team}</white> has been created!"
  disband: "{teams.prefix}<#FF5555>Team <white>{team}</white> has been disbanded."
  leave: "{teams.prefix}<#FFD27F>You left <white>{team}</white>."
  kick: "{teams.prefix}<#FF5555><white>{player}</white> has been kicked from the team."
  join: "{teams.prefix}<#55FF55>You joined <white>{team}</white>!"
  settag-success: "{teams.prefix}<#FFD27F>Team tag updated."
  renamed: "{teams.prefix}<#FFD27F>Team renamed from <white>{old}</white> to <white>{new}</white>."

  # ━━━ INVITES ━━━
  invite: "{teams.prefix}<#FFD27F>Invited <white>{player}</white> to join your team."
  invite-received: "{teams.prefix}<white>{player}</white> <#FFD27F>invited you to join <white>{team}</white>!"
  invite-accepted: "{teams.prefix}<#55FF55><white>{player}</white> joined the team."
  invite-declined-target: "{teams.prefix}<#FFD27F>Invite declined."
  invite-declined-sender: "{teams.prefix}<#FF5555><white>{player}</white> declined your invite."
  invite-expired: "{teams.prefix}<dark_gray>Invite from <white>{team}</white> expired."
  invite-expired-sender: "{teams.prefix}<dark_gray>Your invite to <white>{player}</white> expired."
  no-pending-invite: "{teams.prefix}<#FF5555>No pending invites."

  # ━━━ ALLIES / ENEMIES ━━━
  ally-request-sent: "{teams.prefix}<#FFD27F>Alliance request sent to <#55FF55>{team}</#55FF55>."
  ally-request-received: "{teams.prefix}<#55FF55><white>{team}</white> wants to form an alliance!"
  ally-accepted: "{teams.prefix}<#55FF55>Now allied with <white>{team}</white>!"
  ally-declined-target: "{teams.prefix}<#FFD27F>Alliance with <white>{team}</white> declined."
  ally-declined-sender: "{teams.prefix}<#FF5555><white>{team}</white> declined the alliance."
  ally-expired: "{teams.prefix}<dark_gray>Alliance request with <white>{team}</white> expired."
  enemy: "{teams.prefix}<#FF5555><white>{team}</white> is now your <red>enemy</red>."
  unally: "{teams.prefix}<#FFD27F>No longer allied with <white>{team}</white>."
  unenemy: "{teams.prefix}<#FFD27F><white>{team}</white> removed from enemies."
  allies-disabled: "{teams.prefix}<#FF5555>Allies system is disabled."
  enemies-disabled: "{teams.prefix}<#FF5555>Enemies system is disabled."

  # ━━━ ROLES ━━━
  promoted: "{teams.prefix}<#55FF55><white>{player}</white> promoted to <bold>{role}</bold>."
  promoted-target: "{teams.prefix}<#55FF55>You have been promoted to <bold>{role}</bold>!"
  demoted: "{teams.prefix}<#FF5555><white>{player}</white> demoted to <bold>{role}</bold>."
  demoted-target: "{teams.prefix}<#FF5555>You have been demoted to <bold>{role}</bold>."
  kicked: "{teams.prefix}<#FF5555>You were kicked from <white>{team}</white>."

  # ━━━ PVP ━━━
  pvp-toggle: "{teams.prefix}<#FFD27F>Team PvP is now {state}."

  # ━━━ HOME ━━━
  home: "{teams.prefix}<#FFD27F>Teleporting to team home..."
  home-set: "{teams.prefix}<#55FF55>Team home set at your location."
  home-del: "{teams.prefix}<#FF5555>Team home removed."
  home-cooldown: "{teams.prefix}<#FF5555>On cooldown! <dark_gray>(<white>{time}s</white> remaining)"
  home-wait: "{teams.prefix}<#FFD27F>Teleporting in <white>{time}s</white> <#FFD27F>- don't move!"
  home-teleport: "{teams.prefix}<#55FF55>Teleported to team home."
  home-teleport-cancelled: "{teams.prefix}<#FF5555>Teleport cancelled! <dark_gray>(you moved)"
  home-disabled: "{teams.prefix}<#FF5555>Team homes are disabled."

  # ━━━ WARPS ━━━
  warp: "{teams.prefix}<#FFD27F>Teleporting to warp <white>{warp}</white>"
  warp-set: "{teams.prefix}<#55FF55>Warp <white>{warp}</white> created."
  warp-del: "{teams.prefix}<#FF5555>Warp <white>{warp}</white> deleted."
  warp-cooldown: "{teams.prefix}<#FF5555>On cooldown! <dark_gray>(<white>{time}s</white> remaining)"
  warp-wait: "{teams.prefix}<#FFD27F>Warping in <white>{time}s</white> <#FFD27F>- don't move!"
  warp-teleport: "{teams.prefix}<#55FF55>Teleported to <white>{warp}</white>."
  warp-teleport-cancelled: "{teams.prefix}<#FF5555>Warp cancelled! <dark_gray>(you moved)"
  warps-disabled: "{teams.prefix}<#FF5555>Team warps are disabled."
  warp-not-found: "{teams.prefix}<#FF5555>Warp not found."
  warp-already-exists: "{teams.prefix}<#FF5555>A warp with that name already exists."

  # ━━━ PERMISSIONS ━━━
  only-owner: "{teams.prefix}<#FF5555>Only team <bold>owners</bold> can do this."
  only-admin: "{teams.prefix}<#FF5555>Only <bold>admins</bold> or <bold>owners</bold> can do this."

  # ━━━ ERRORS ━━━
  no-team: "{teams.prefix}<#FF5555>You are not in a team."
  team-not-found: "{teams.prefix}<#FF5555>Team not found."
  player-not-found: "{teams.prefix}<#FF5555>Player not found or offline."
  already-in-team: "{teams.prefix}<#FF5555>You are already in a team."
  team-full: "{teams.prefix}<#FF5555>This team is full."
  already-ally: "{teams.prefix}<#FF5555>Already allied with that team."
  already-enemy: "{teams.prefix}<#FF5555>Already enemies with that team."
  not-ally: "{teams.prefix}<#FF5555>Not allied with that team."
  not-enemy: "{teams.prefix}<#FF5555>Not enemies with that team."
  cannot-self: "{teams.prefix}<#FF5555>You cannot target your own team."
  max-admins-reached: "{teams.prefix}<#FF5555>Max admins reached."
  max-owners-reached: "{teams.prefix}<#FF5555>Max owners reached."
  max-warps-reached: "{teams.prefix}<#FF5555>Max warps reached."
  max-allies-reached: "{teams.prefix}<#FF5555>Max allies reached."
  max-enemies-reached: "{teams.prefix}<#FF5555>Max enemies reached."
  team-already-exists: "{teams.prefix}<#FF5555>A team with that name already exists."
  name-too-short: "{teams.prefix}<#FF5555>Name must be at least <white>{min}</white> characters."
  name-too-long: "{teams.prefix}<#FF5555>Name cannot exceed <white>{max}</white> characters."
  name-banned: "{teams.prefix}<#FF5555>That name contains banned words."
  not-in-team: "{teams.prefix}<#FF5555>That player is not in your team."
  home-not-set: "{teams.prefix}<#FF5555>No team home set."
  cannot-leave-as-owner: "{teams.prefix}<#FF5555>You're the last owner! <dark_gray>Disband or promote someone first."
  cannot-kick-higher: "{teams.prefix}<#FF5555>Cannot kick someone of equal or higher rank."
  already-highest-rank: "{teams.prefix}<#FF5555>Already at the highest rank."
  already-lowest-rank: "{teams.prefix}<#FF5555>Already at the lowest rank."
  cannot-demote-last-owner: "{teams.prefix}<#FF5555>Cannot demote the last owner. <dark_gray>Promote someone first."
  echest-disabled: "{teams.prefix}<#FF5555>Team echest is disabled."
  tag-invalid-length: "{teams.prefix}<#FF5555>Tag must be <white>{min}-{max}</white> characters."

